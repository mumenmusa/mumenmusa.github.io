<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title | escape }} · {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
{% seo %}
</head>
<body>
<div class="wrap">

<header class="site">
  <a class="brand" href="{{ '/' | relative_url }}">mumenmusa</a>
  <nav>
    <a href="{{ '/' | relative_url }}">writing</a>
    <a href="{{ '/about/' | relative_url }}">about</a>
  </nav>
</header>

{{ content }}

<footer class="site">
  <span>mumen.musa.ai</span>
  <span>built with lots of adorable <span class="heart">🐣</span></span>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  (function () {
    if (typeof mermaid === "undefined") return;
    mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "default" });
    function init() {
      // kramdown emits <pre><code class="language-mermaid">...</code></pre>;
      // mermaid.js wants <pre class="mermaid">...</pre>. Convert in place.
      var blocks = document.querySelectorAll("pre > code.language-mermaid");
      blocks.forEach(function (code) {
        var pre = code.parentElement;
        var mermaidPre = document.createElement("pre");
        mermaidPre.className = "mermaid";
        mermaidPre.textContent = code.textContent;
        pre.replaceWith(mermaidPre);
      });
      if (blocks.length) {
        try { mermaid.run(); } catch (e) { console.error("mermaid.run failed:", e); }
      }
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
</body>
</html>
